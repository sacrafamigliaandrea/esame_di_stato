<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Esame di Stato del Primo Ciclo — Lezione</title>
<style>
/* ============================================================
   CONFIG VISIVA — palette istituzionale (scuola)
   ============================================================ */
:root{
  --blu:#123E90;          /* blu istituzionale */
  --blu-scuro:#0d2d6b;
  --blu-medio:#2d5bb8;
  --blu-chiaro:#e8eef9;
  --blu-velo:#f4f7fc;
  --oro:#b8860b;          /* accento sobrio (evidenza positiva) */
  --oro-velo:#fbf6e7;
  --verde:#1B6D3F;        /* solo per conferme/check */
  --verde-velo:#eaf3ee;
  --ambra:#a9730a;
  --ambra-velo:#fdf4e3;
  --inchiostro:#1c2535;
  --grigio:#5b6776;
  --linea:#d4dce8;
  --bianco:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:"Gill Sans","Gill Sans MT",Calibri,"Segoe UI",system-ui,-apple-system,sans-serif;
  color:var(--inchiostro);
  background:var(--blu-velo);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

/* ---------- TESTATA MINISTERIALE ---------- */
header.ministero{
  background:var(--blu);
  color:#fff;
  border-bottom:5px solid var(--oro);
}
.ministero .wrap{
  max-width:1140px;margin:0 auto;padding:18px 28px;
  display:flex;align-items:center;gap:20px;
}
.stemma{flex:0 0 auto}
.ministero h1{
  font-size:1.55rem;font-weight:600;letter-spacing:.2px;line-height:1.15;
}
.ministero .sub{
  font-size:.95rem;font-weight:400;opacity:.92;margin-top:3px;
}
.fascia-scuola{
  background:var(--blu-scuro);color:#fff;text-align:center;
  padding:10px 20px;font-size:1.02rem;letter-spacing:.3px;
}
.fascia-scuola strong{font-weight:600}
.fascia-scuola .anno{opacity:.8;font-weight:400;margin-left:8px}

/* ---------- STEPPER ---------- */
nav.stepper{
  position:sticky;top:0;z-index:30;
  background:var(--bianco);border-bottom:1px solid var(--linea);
  box-shadow:0 2px 8px rgba(18,62,144,.06);
}
.stepper-wrap{
  max-width:1140px;margin:0 auto;display:flex;overflow-x:auto;
}
.stepper button{
  flex:1 0 auto;min-width:118px;background:none;border:none;cursor:pointer;
  padding:12px 10px 11px;font-family:inherit;font-size:.82rem;color:var(--grigio);
  border-bottom:3px solid transparent;transition:.15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:5px;line-height:1.2;
}
.stepper button:hover{color:var(--blu);background:var(--blu-velo)}
.stepper button.attivo{color:var(--blu);border-bottom-color:var(--blu);font-weight:600}
.stepper .num{
  display:flex;align-items:center;justify-content:center;
  width:26px;height:26px;border-radius:50%;background:var(--blu-chiaro);
  color:var(--blu);font-weight:700;font-size:.85rem;flex:0 0 auto;
}
.stepper button.attivo .num{background:var(--blu);color:#fff}
.stepper button.fatto .num{background:var(--verde);color:#fff}

/* ---------- CONTENUTO ---------- */
main{max-width:1140px;margin:0 auto;padding:34px 28px 80px}
section.tappa{display:none;animation:fade .35s ease}
section.tappa.visibile{display:block}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.kicker{
  display:inline-flex;align-items:center;gap:8px;
  color:var(--blu);font-weight:600;font-size:.82rem;letter-spacing:1.4px;
  text-transform:uppercase;margin-bottom:10px;
}
.kicker .barra{width:28px;height:2px;background:var(--oro)}
h2.titolo{font-size:2rem;font-weight:600;color:var(--blu-scuro);line-height:1.12;margin-bottom:8px}
.occhiello{font-size:1.08rem;color:var(--grigio);max-width:760px;margin-bottom:28px}

/* ---------- CARD GRID ---------- */
.griglia{display:grid;gap:18px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:repeat(2,1fr)}
@media(max-width:900px){.g4,.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:620px){.g4,.g3,.g2{grid-template-columns:1fr}}

.card{
  background:var(--bianco);border:1px solid var(--linea);border-radius:10px;
  padding:22px 20px;transition:.18s;
}
.card:hover{border-color:var(--blu-medio);box-shadow:0 6px 20px rgba(18,62,144,.09);transform:translateY(-2px)}
.card .ico{
  width:46px;height:46px;border-radius:9px;background:var(--blu-chiaro);
  display:flex;align-items:center;justify-content:center;margin-bottom:14px;
}
.card h3{font-size:1.12rem;color:var(--blu-scuro);font-weight:600;margin-bottom:7px}
.card p{font-size:.95rem;color:var(--grigio)}
.card .nota{
  margin-top:13px;padding-top:12px;border-top:1px dashed var(--linea);
  font-size:.86rem;color:var(--inchiostro);
}
.card .nota b{color:var(--ambra)}

/* ---------- TIMELINE ---------- */
.timeline{position:relative;margin:10px 0 6px;padding-left:6px}
.tl-item{
  position:relative;padding:0 0 26px 42px;border-left:2px solid var(--blu-chiaro);
}
.tl-item:last-child{border-left-color:transparent;padding-bottom:0}
.tl-dot{
  position:absolute;left:-9px;top:2px;width:18px;height:18px;border-radius:50%;
  background:var(--bianco);border:3px solid var(--blu);
}
.tl-item:last-child .tl-dot{background:var(--oro);border-color:var(--oro)}
.tl-data{
  display:inline-block;background:var(--blu);color:#fff;font-weight:600;
  font-size:.86rem;padding:3px 12px;border-radius:14px;margin-bottom:5px;
}
.tl-evento{font-size:1.12rem;color:var(--blu-scuro);font-weight:600}
.tl-desc{font-size:.93rem;color:var(--grigio);margin-top:2px}
.avviso-date{
  background:var(--blu-velo);border:1px solid var(--linea);border-radius:8px;
  padding:12px 16px;font-size:.88rem;color:var(--grigio);margin-top:20px;
  display:flex;gap:10px;align-items:flex-start;
}

/* ---------- CALCOLATORE ---------- */
.calc-layout{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:6px}
@media(max-width:820px){.calc-layout{grid-template-columns:1fr}}
.pannello{background:var(--bianco);border:1px solid var(--linea);border-radius:10px;padding:24px}
.pannello h3{color:var(--blu-scuro);font-size:1.15rem;margin-bottom:16px;font-weight:600;
  display:flex;align-items:center;gap:9px}
.campo{margin-bottom:14px}
.campo label{display:block;font-size:.9rem;color:var(--inchiostro);font-weight:600;margin-bottom:5px}
.campo .hint{font-weight:400;color:var(--grigio);font-size:.82rem}
.campo input[type=range]{width:100%;accent-color:var(--blu);height:6px}
.campo .row{display:flex;align-items:center;gap:14px}
.valore{
  flex:0 0 48px;text-align:center;background:var(--blu-chiaro);color:var(--blu-scuro);
  font-weight:700;font-size:1.15rem;border-radius:7px;padding:6px 0;
}
.risultato{text-align:center;padding:8px 0}
.risultato .lbl{font-size:.9rem;color:var(--grigio);text-transform:uppercase;letter-spacing:1px}
.voto-finale{
  font-size:5rem;font-weight:700;color:var(--blu);line-height:1;margin:6px 0;
  font-family:"DIN Alternate","Gill Sans",sans-serif;
}
.badge-lode{
  display:inline-block;background:var(--oro);color:#fff;font-weight:700;
  padding:5px 18px;border-radius:18px;font-size:.95rem;letter-spacing:1.5px;margin-top:4px;
}
.passaggi{margin-top:18px;font-size:.92rem}
.passaggi .step{
  display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--linea);
}
.passaggi .step:last-child{border-bottom:none}
.passaggi .step span:first-child{color:var(--grigio)}
.passaggi .step span:last-child{font-weight:600;color:var(--blu-scuro);font-variant-numeric:tabular-nums}
.passaggi .step.finale span:last-child{color:var(--blu);font-size:1.05rem}

/* ---------- RIQUADRO ATTENZIONE ---------- */
.attenzione{
  background:var(--ambra-velo);border-left:4px solid var(--ambra);border-radius:6px;
  padding:18px 20px;margin-top:24px;
}
.attenzione h4{color:var(--ambra);font-size:1rem;margin-bottom:7px;display:flex;align-items:center;gap:8px}
.attenzione p{font-size:.93rem;color:var(--inchiostro)}
.attenzione .esempio{
  margin-top:10px;font-family:"DIN Alternate",monospace;font-size:.9rem;
  background:#fff;border:1px solid var(--linea);border-radius:6px;padding:10px 14px;color:var(--grigio);
}
.attenzione .esempio b{color:var(--inchiostro)}

/* ---------- SCHEMA ELABORATO (9 slide) ---------- */
.slide-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:780px){.slide-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:520px){.slide-grid{grid-template-columns:1fr}}
.mini-slide{
  background:var(--bianco);border:1px solid var(--linea);border-radius:8px;
  padding:16px;min-height:118px;position:relative;transition:.15s;
}
.mini-slide:hover{border-color:var(--blu-medio);box-shadow:0 4px 14px rgba(18,62,144,.08)}
.mini-slide .ns{
  position:absolute;top:12px;right:14px;font-size:.72rem;color:var(--blu-medio);
  font-weight:700;letter-spacing:1px;
}
.mini-slide h4{color:var(--blu-scuro);font-size:1rem;margin-bottom:6px;padding-right:48px}
.mini-slide ul{list-style:none;font-size:.86rem;color:var(--grigio)}
.mini-slide li{padding:1px 0 1px 14px;position:relative}
.mini-slide li::before{content:"";position:absolute;left:0;top:9px;width:5px;height:5px;border-radius:50%;background:var(--blu-medio)}
.mini-slide.fornita{background:var(--blu-chiaro);border-color:var(--blu-medio)}
.mini-slide.fornita h4{color:var(--blu)}
.fase-banner{display:flex;align-items:center;gap:14px;background:var(--blu);color:#fff;border-radius:9px;padding:13px 20px;margin:6px 0 16px}
.fase-banner .fase-num{background:var(--oro);color:#fff;font-weight:700;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;padding:4px 13px;border-radius:14px;flex:0 0 auto}
.fase-banner b{font-size:1.05rem;display:block}
.fase-banner span{font-size:.88rem;opacity:.9}
.callout-visivo,.revisione-step{display:flex;gap:11px;align-items:flex-start;border-radius:8px;padding:14px 18px;font-size:.93rem;margin:16px 0 26px;line-height:1.45}
.callout-visivo{background:var(--ambra-velo);border:1px solid var(--ambra)}
.callout-visivo b{color:var(--ambra)}
.callout-visivo svg,.revisione-step svg{flex:0 0 auto;margin-top:1px}
.revisione-step{background:var(--verde-velo);border:1px solid var(--verde);margin-bottom:0}
.revisione-step b{color:var(--verde)}

/* ---------- AREE DISCIPLINARI ---------- */
.aree{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(max-width:700px){.aree{grid-template-columns:1fr}}
.area{
  background:var(--bianco);border:1px solid var(--linea);border-radius:10px;padding:20px;
  display:flex;gap:16px;
}
.area .ico{flex:0 0 auto;width:44px;height:44px;border-radius:9px;background:var(--blu-chiaro);
  display:flex;align-items:center;justify-content:center}
.area h3{color:var(--blu-scuro);font-size:1.08rem;margin-bottom:4px}
.area .materie{font-size:.9rem;color:var(--blu);font-weight:600;margin-bottom:6px}
.area p{font-size:.9rem;color:var(--grigio)}

/* ---------- VALUTAZIONE ---------- */
.valuta{display:grid;grid-template-columns:repeat(2,1fr);gap:10px 28px;margin-top:8px}
@media(max-width:640px){.valuta{grid-template-columns:1fr}}
.valuta .v{display:flex;gap:11px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--linea)}
.valuta .v svg{flex:0 0 auto;margin-top:2px}
.valuta .v span{font-size:.95rem;color:var(--inchiostro)}

/* ---------- ESEMPIO MAPPA ---------- */
.mappa-esempio{
  background:var(--bianco);border:1px solid var(--linea);border-radius:12px;
  padding:26px;margin-top:8px;
}
.mappa-centro{
  text-align:center;background:var(--blu);color:#fff;border-radius:10px;
  padding:18px;max-width:420px;margin:0 auto 22px;
}
.mappa-centro .et{font-size:.78rem;letter-spacing:1.5px;opacity:.85;text-transform:uppercase}
.mappa-centro .tit{font-size:1.5rem;font-weight:600;margin:3px 0}
.mappa-centro .sub{font-size:.9rem;opacity:.9}
.rami{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:760px){.rami{grid-template-columns:1fr}}
.ramo{border:1px solid var(--linea);border-radius:9px;padding:15px;background:var(--blu-velo)}
.ramo h4{color:var(--blu);font-size:.85rem;text-transform:uppercase;letter-spacing:.6px;margin-bottom:9px;
  padding-bottom:7px;border-bottom:1px solid var(--linea)}
.ramo .voce{margin-bottom:9px}
.ramo .voce b{display:block;color:var(--blu-scuro);font-size:.92rem}
.ramo .voce span{font-size:.85rem;color:var(--grigio)}

/* ---------- CHECKLIST ---------- */
.check-list{max-width:720px}
.check-item{
  display:flex;gap:14px;align-items:center;background:var(--bianco);
  border:1px solid var(--linea);border-radius:9px;padding:15px 18px;margin-bottom:11px;
  cursor:pointer;transition:.15s;
}
.check-item:hover{border-color:var(--blu-medio)}
.check-item.spuntato{background:var(--verde-velo);border-color:var(--verde)}
.check-box{
  flex:0 0 auto;width:26px;height:26px;border-radius:6px;border:2px solid var(--blu-medio);
  display:flex;align-items:center;justify-content:center;transition:.15s;
}
.check-item.spuntato .check-box{background:var(--verde);border-color:var(--verde)}
.check-box svg{opacity:0;transition:.15s}
.check-item.spuntato .check-box svg{opacity:1}
.check-item .txt{font-size:1rem;color:var(--inchiostro)}
.check-item.spuntato .txt{color:var(--verde)}
.progresso{
  margin-top:22px;background:var(--bianco);border:1px solid var(--linea);border-radius:9px;
  padding:18px 20px;text-align:center;
}
.progresso .barra-est{height:10px;background:var(--blu-chiaro);border-radius:6px;overflow:hidden;margin:10px 0}
.progresso .barra-int{height:100%;background:var(--verde);width:0;transition:.4s;border-radius:6px}
.progresso .msg{font-size:.95rem;color:var(--grigio)}
.progresso .msg b{color:var(--blu-scuro)}

/* ---------- HOME ---------- */
.home-hero{
  background:linear-gradient(135deg,var(--blu) 0%,var(--blu-scuro) 100%);
  color:#fff;border-radius:14px;padding:48px 44px;margin-bottom:30px;position:relative;overflow:hidden;
}
.home-hero::after{
  content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;
  border:40px solid rgba(255,255,255,.05);border-radius:50%;
}
.home-hero .et{font-size:.85rem;letter-spacing:2px;text-transform:uppercase;opacity:.85;margin-bottom:12px}
.home-hero h2{font-size:2.6rem;font-weight:600;line-height:1.08;margin-bottom:14px;color:#fff}
.home-hero p{font-size:1.12rem;opacity:.94;max-width:640px}
.home-info{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:8px}
@media(max-width:700px){.home-info{grid-template-columns:1fr}}
.info-box{background:var(--bianco);border:1px solid var(--linea);border-radius:10px;padding:20px}
.info-box .n{font-size:2.2rem;font-weight:700;color:var(--blu);line-height:1;font-family:"DIN Alternate",sans-serif}
.info-box .l{font-size:.92rem;color:var(--grigio);margin-top:5px}

/* ---------- NAVIGAZIONE BASSO ---------- */
.nav-basso{display:flex;justify-content:space-between;gap:14px;margin-top:40px;
  padding-top:24px;border-top:1px solid var(--linea)}
.btn{
  font-family:inherit;font-size:.98rem;font-weight:600;cursor:pointer;border-radius:8px;
  padding:12px 26px;border:1px solid var(--blu);transition:.15s;display:inline-flex;align-items:center;gap:9px;
}
.btn-primario{background:var(--blu);color:#fff}
.btn-primario:hover{background:var(--blu-scuro)}
.btn-secondario{background:#fff;color:var(--blu)}
.btn-secondario:hover{background:var(--blu-velo)}
.btn:disabled{opacity:.35;cursor:not-allowed}

/* ---------- FOOTER ---------- */
footer{
  background:var(--blu-scuro);color:#fff;text-align:center;padding:20px;
  font-size:.85rem;opacity:.95;
}
footer span{opacity:.7}
</style>
</head>

    calcolatrice:`<rect x="5" y="3" width="14" height="18" rx="2" stroke="${c}" stroke-width="1.8"/><path d="M8 7h8M8 12h.5M12 12h.5M16 12h.5M8 16h.5M12 16h.5M16 16h.5" stroke="${c}" stroke-width="1.8" stroke-linecap="round"/>`,
    globo:`<circle cx="12" cy="12" r="9" stroke="${c}" stroke-width="1.8"/><path d="M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18" stroke="${c}" stroke-width="1.8"/>`,

    atomo:`<circle cx="12" cy="12" r="2.2" fill="${c}"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c}" stroke-width="1.6"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c}" stroke-width="1.6" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="10" ry="4" stroke="${c}" stroke-width="1.6" transform="rotate(120 12 12)"/>`,
    tavolozza:`<path d="M12 3a9 9 0 0 0 0 18c1.2 0 1.8-1 1.5-2-.3-1 .3-2 1.5-2h1.5a4 4 0 0 0 4-4c0-5-4-8-8.5-8z" stroke="${c}" stroke-width="1.8" stroke-linejoin="round"/><circle cx="8" cy="11" r="1.1" fill="${c}"/><circle cx="12" cy="8" r="1.1" fill="${c}"/><circle cx="16" cy="11" r="1.1" fill="${c}"/>`,
    bilancia:`<path d="M12 3v18M6 21h12M5 7h14M5 7l-2.5 6a3 3 0 0 0 5 0zM19 7l-2.5 6a3 3 0 0 0 5 0z" stroke="${c}" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>`,
    lingua:`<path d="M4 5h11v9H9l-3 3v-3H4z" stroke="${c}" stroke-width="1.8" stroke-linejoin="round"/><path d="M11 14h9v6l-3-3h-4" stroke="${c}" stroke-width="1.8" stroke-linejoin="round"/>`,
    bussola:`<circle cx="12" cy="12" r="9" stroke="${c}" stroke-width="1.8"/><path d="M15.5 8.5l-2 5-5 2 2-5z" stroke="${c}" stroke-width="1.7" stroke-linejoin="round"/>`,
    documento:`<path d="M6 3h8l4 4v14a1 1 0 0 1-1 1H6a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z" stroke="${c}" stroke-width="1.8"/><path d="M14 3v4h4M8 12h8M8 16h5" stroke="${c}" stroke-width="1.8" stroke-linecap="round"/>`,
    cervello:`<path d="M9 4a3 3 0 0 0-3 3 3 3 0 0 0-1 5 3 3 0 0 0 1 5 3 3 0 0 0 5 1V4.5A2.5 2.5 0 0 0 9 4zM15 4a3 3 0 0 1 3 3 3 3 0 0 1 1 5 3 3 0 0 1-1 5 3 3 0 0 1-5 1V4.5A2.5 2.5 0 0 1 15 4z" stroke="${c}" stroke-width="1.6" stroke-linejoin="round"/>`,

/* ---------- DATI TAPPE ---------- */
const TAPPE = [

const visitate = new Set([0]);

/* ============================================================
   RENDER CONTENUTI
   ============================================================ */
function contenuto(id){
  switch(id){

  /* -------- HOME -------- */
  case "home": return `
    <div class="home-hero">
      <div class="et">Lezione interattiva — primo ciclo d'istruzione</div>
      <h2>L'Esame di Stato:<br>capirlo prima di affrontarlo</h2>
      <p>Un percorso in otto tappe per arrivare all'esame con le idee chiare:
      che cosa serve per essere ammessi, come funzionano le prove, come si calcola il voto
      e come si costruisce l'elaborato che presenterai al colloquio.</p>
    </div>
    <div class="home-info">
      <div class="info-box"><div class="n">3</div><div class="l">prove scritte: Italiano, Matematica, Lingue straniere</div></div>
      <div class="info-box"><div class="n">+1</div><div class="l">colloquio orale pluridisciplinare</div></div>
      <div class="info-box"><div class="n">10<span style="font-size:1.1rem"> e lode</span></div><div class="l">voto massimo conseguibile all'esame</div></div>

    <div class="avviso-date" style="margin-top:20px">

      <div>Usa lo <b>stepper in alto</b> oppure i pulsanti in fondo a ogni tappa per spostarti.
      Le tappe completate vengono segnate in verde.</div>
    </div>`;

  /* -------- REQUISITI -------- */
  case "requisiti": return `
    <div class="kicker"><span class="barra"></span>Tappa 1</div>
    <h2 class="titolo">Requisiti per l'ammissione</h2>
    <p class="occhiello">Per essere ammessi all'esame la normativa richiede quattro condizioni.
    Riguardano la frequenza, la partecipazione alle prove nazionali, la valutazione finale e la condotta.</p>
    <div class="griglia g4">
      <div class="card">
        <div class="ico">${ico("calendario")}</div>
        <h3>Frequenza scolastica</h3>
        <p>Occorre aver frequentato almeno <b>i tre quarti</b> dell'orario annuale (75%).</p>
        <div class="nota"><b>Deroghe</b> possibili in casi eccezionali (gravi motivi di salute o familiari), se lo studente è comunque valutabile.</div>
      </div>
      <div class="card">
        <div class="ico">${ico("monitor")}</div>
        <h3>Prove nazionali INVALSI</h3>
        <p>La partecipazione alle prove di <b>Italiano, Matematica e Inglese</b> è obbligatoria.</p>
        <div class="nota">Il <b>risultato</b> delle prove <b>non incide</b> sull'ammissione: conta l'aver partecipato.</div>
      </div>
      <div class="card">
        <div class="ico">${ico("voto")}</div>
        <h3>Voto di ammissione</h3>
        <p>Assegnato in decimi dal Consiglio di Classe durante lo <b>scrutinio finale</b>.</p>
        <div class="nota">È possibile l'ammissione <b>anche con qualche insufficienza</b>, con motivazione specifica del Consiglio.</div>
      </div>
      <div class="card">
        <div class="ico">${ico("scudo")}</div>
        <h3>Condotta</h3>
        <p>Non devono essere state irrogate <b>sanzioni disciplinari di esclusione</b> dallo scrutinio finale.</p>
        <div class="nota">L'esclusione dallo scrutinio impedisce l'ammissione all'esame.</div>
      </div>
    </div>`;

  /* -------- CALENDARIO -------- */
  case "calendario": return `
    <div class="kicker"><span class="barra"></span>Tappa 2</div>
    <h2 class="titolo">Il calendario di lavoro</h2>
    <p class="occhiello">Le tappe che scandiscono la preparazione, dalla presentazione dell'esame
    alla consegna finale dell'elaborato.</p>
    <div class="timeline">
      ${CONFIG.tappe.map(t=>`
        <div class="tl-item">
          <div class="tl-dot"></div>
          <div class="tl-data">${t.data}</div>
          <div class="tl-evento">${t.evento}</div>
          <div class="tl-desc">${t.desc}</div>
        </div>`).join("")}
    </div>
    <div class="avviso-date">
      ${ico("info","#5b6776")}
      <div>Le date sono <b>indicative</b> e cambiano ogni anno scolastico: vengono comunicate ufficialmente all'inizio del percorso.</div>
    </div>`;

  /* -------- PROVE -------- */
  case "prove": return `
    <div class="kicker"><span class="barra"></span>Tappa 3</div>
    <h2 class="titolo">Le prove d'esame</h2>
    <p class="occhiello">L'esame si compone di tre prove scritte e di un colloquio orale.

    <div class="griglia g4">
      <div class="card">
        <div class="ico">${ico("penna")}</div>
        <h3>Italiano</h3>
        <p>Prova scritta sulle competenze di comprensione e produzione: testo narrativo o descrittivo, testo argomentativo oppure sintesi.</p>
      </div>
      <div class="card">
        <div class="ico">${ico("calcolatrice")}</div>
        <h3>Matematica</h3>
        <p>Prova scritta con problemi e quesiti su numeri, spazio e figure, relazioni e dati, per verificare ragionamento e risoluzione.</p>
      </div>
      <div class="card">
        <div class="ico">${ico("globo")}</div>
        <h3>Lingue straniere</h3>
        <p>Prova scritta articolata nelle due lingue studiate (Inglese e seconda lingua comunitaria).</p>
      </div>
      <div class="card">
        <div class="ico">${ico("microfono")}</div>
        <h3>Colloquio orale</h3>
        <p>Colloquio <b>pluridisciplinare</b> a partire dall'elaborato: collegamenti tra le discipline, argomentazione e pensiero critico.</p>

    <div class="avviso-date" style="margin-top:20px">
      ${ico("info","#5b6776")}

  /* -------- VOTO / CALCOLATORE -------- */

    <h2 class="titolo">Come si calcola il voto finale</h2>
    <p class="occhiello">Il voto finale è la <b>media tra il voto di ammissione e la media delle prove d'esame</b>

      <div class="pannello">
        <h3>${ico("voto")} I tuoi voti</h3>

        </div>

        <div class="campo">
          <label>Prova di Matematica</label>

      </div>
    </div>

    <div class="attenzione">
      <h4>${ico("info","#a9730a")} Attenzione all'errore più comune</h4>
      <p>Il voto finale <b>non</b> è la media semplice dei cinque voti. È invece la media di due quantità:
      il voto di ammissione, e la media delle quattro prove. I due metodi possono dare risultati diversi.</p>
      <div class="esempio">
        Ammissione <b>6</b> · prove tutte <b>10</b> &nbsp;→&nbsp;
        formula corretta = (6 + 10) / 2 = <b>8</b> &nbsp;|&nbsp;
        media dei 5 voti = 46 / 5 = 9,2 → <b>9</b>
      </div>
    </div>

    <div class="attenzione" style="background:var(--oro-velo);border-left-color:var(--oro)">
      <h4 style="color:var(--oro)">${ico("voto","#b8860b")} La regola dell'arrotondamento e la lode</h4>
      <p>Il voto si arrotonda all'unità superiore quando la frazione è <b>uguale o maggiore di 0,5</b>
      (esempio: 7,5 diventa 8). La <b>lode</b> può essere attribuita, con decisione unanime della commissione,
      a chi consegue il dieci con un percorso d'esame eccellente.</p>
    </div>`;

  /* -------- COLLOQUIO -------- */
  case "colloquio": return `
    <div class="kicker"><span class="barra"></span>Tappa 5</div>
    <h2 class="titolo">Il colloquio pluridisciplinare</h2>
    <p class="occhiello">Parti da un <b>argomento principale</b> e da un <b>progetto di vita</b>, e costruisci
    collegamenti significativi con le diverse aree disciplinari — almeno uno per area.</p>

    <div class="aree" style="margin-bottom:26px">
      <div class="area">
        <div class="ico">${ico("libro")}</div>
        <div><h3>Area letteraria</h3><div class="materie">Italiano · Storia · Geografia</div>
        <p>Collegamenti con autori, opere, eventi, luoghi e fenomeni studiati.</p></div>
      </div>
      <div class="area">
        <div class="ico">${ico("atomo")}</div>
        <div><h3>Area matematico-scientifica</h3><div class="materie">Matematica · Scienze · Tecnologia</div>

      <div class="area">
        <div class="ico">${ico("lingua")}</div>
        <div><h3>Lingue straniere</h3><div class="materie">Inglese · seconda lingua</div>
        <p>Esposizione di una parte, o risposta a domande, in lingua straniera.</p></div>
      </div>

    <h3 style="color:var(--blu-scuro);font-size:1.2rem;margin-bottom:14px">Che cosa viene valutato del colloquio</h3>

      ${["Capacità di argomentazione attraverso l'uso della lingua",
         "Risoluzione dei problemi",
         "Pensiero critico e riflessivo",
         "Collegamento organico e significativo tra le discipline",
         "Competenze nell'uso delle lingue straniere",
         "Competenza in educazione civica",
         "Qualità dell'elaborato digitale di presentazione",
         "Eventuale artefatto (facoltativo)"]
        .map(v=>`<div class="v">${ico("check","#1B6D3F")}<span>${v}</span></div>`).join("")}
    </div>`;

  /* -------- ELABORATO -------- */
  case "elaborato": return `
    <div class="kicker"><span class="barra"></span>Tappa 6</div>
    <h2 class="titolo">L'elaborato digitale</h2>
    <p class="occhiello">L'elaborato è la presentazione in nove slide che accompagna il colloquio.
    Si costruisce in due fasi: prima si sviluppano argomento e aree disciplinari, poi si documenta il lavoro con trasparenza.</p>

    <div class="fase-banner">
      <span class="fase-num">Fase 1</span>
      <div><b>Introduzione e sviluppo disciplinare</b><span>Argomento, collegamenti e una slide per ciascuna area</span></div>
    </div>
    <div class="slide-grid">
      <div class="mini-slide fornita"><span class="ns">Slide 1</span><h4>Copertina</h4><ul><li>Fornita dalla scuola</li><li>Intestazione e dati</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 2</span><h4>Titolo e collegamenti</h4><ul><li>Argomento principale</li><li>Anteprima dei collegamenti tra le materie</li><li>Immagine di sfondo significativa</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 3</span><h4>Area letteraria</h4><ul><li>Parole chiave</li><li>Immagine significativa</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 4</span><h4>Area matematico-scientifica</h4><ul><li>Parole chiave</li><li>Immagine significativa</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 5</span><h4>Area artistico-espressiva</h4><ul><li>Parole chiave</li><li>Immagine significativa</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 6</span><h4>Lingue</h4><ul><li>Parole chiave</li><li>Immagine significativa</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 7</span><h4>Educazione civica</h4><ul><li>Parole chiave</li><li>Immagine significativa</li></ul></div>

    <div class="slide-grid">
      <div class="mini-slide"><span class="ns">Slide 8</span><h4>Artefatto</h4><ul><li>Presentazione visiva del prodotto realizzato</li><li>Immagini o video</li></ul></div>
      <div class="mini-slide"><span class="ns">Slide 9</span><h4>Fonti e IA</h4><ul><li>Bibliografia e sitografia complete: libri, siti, articoli</li><li>Dichiarazione trasparente sull'eventuale uso dell'IA</li></ul></div>
    </div>

    <div class="revisione-step">
      ${ico("check","#1B6D3F")}
      <div><b>Revisione finale.</b> Prima della consegna, rileggi tutte e nove le slide e verificane la coerenza e la completezza.</div>
    </div>`;

  /* -------- MAPPA -------- */
  case "mappa": return `
    <div class="kicker"><span class="barra"></span>Tappa 7</div>
    <h2 class="titolo">Costruire la mappa multidisciplinare</h2>
    <p class="occhiello">Un buon argomento è quello che si lascia attraversare da tutte le aree.
    Ecco un esempio sviluppato: <b>la moda tecnologica</b>.</p>
    <div class="mappa-esempio">
      <div class="mappa-centro">
        <div class="et">Argomento principale</div>
        <div class="tit">La moda tecnologica</div>
        <div class="sub">Il punto di partenza che unisce tutte le aree del sapere</div>
      </div>
      <div class="rami">
        <div class="ramo">
          <h4>Area umanistica e sociale</h4>
          <div class="voce"><b>Letteratura</b><span>Le "Città invisibili" di Calvino: mondi che fondono architettura, design e società.</span></div>
          <div class="voce"><b>Storia</b><span>Artigianato vs. industria: l'evoluzione della produzione degli abiti nel tempo.</span></div>
          <div class="voce"><b>Geografia</b><span>I poli della moda tech: capitali dell'innovazione come Milano e Tokyo.</span></div>
        </div>
        <div class="ramo">
          <h4>Area scientifico-tecnologica</h4>
          <div class="voce"><b>Matematica</b><span>Ottimizzazione dei materiali: ridurre gli sprechi di tessuto nella produzione.</span></div>
          <div class="voce"><b>Scienze</b><span>Tessuti intelligenti: materiali che reagiscono all'ambiente o al corpo.</span></div>
          <div class="voce"><b>Tecnologia</b><span>Stampa 3D per abiti: capi su misura e design complessi.</span></div>
        </div>
        <div class="ramo">
          <h4>Area artistico-espressiva</h4>
          <div class="voce"><b>Arte</b><span>Collezioni futuristiche: l'esempio della stilista Iris van Herpen.</span></div>
          <div class="voce"><b>Musica</b><span>Costumi di scena tecnologici: luci e suoni integrati negli abiti.</span></div>
          <div class="voce"><b>Scienze motorie</b><span>Abbigliamento aerodinamico: tessuti tecnici per la prestazione sportiva.</span></div>
        </div>
        <div class="ramo">
          <h4>Lingue straniere</h4>
          <div class="voce"><b>Vocabolario specifico</b><span>Termini come "wearable tech" o "startup dei tessuti".</span></div>
        </div>
        <div class="ramo">
          <h4>Educazione civica</h4>
          <div class="voce"><b>Consumo etico</b><span>Riflettere sull'impatto ambientale e sociale della moda.</span></div>
        </div>
        <div class="ramo" style="display:flex;flex-direction:column;justify-content:center;background:var(--blu-chiaro);border-color:var(--blu-medio)">
          <div style="text-align:center">${ico("bussola","#123E90")}
          <p style="font-size:.9rem;color:var(--blu-scuro);margin-top:8px;font-weight:600">Ora tocca a te: scegli il tuo argomento e cerca almeno un collegamento per ogni area.</p></div>
        </div>
      </div>
    </div>`;

  /* -------- CHIUSURA -------- */
  case "chiusura": return `
    <div class="kicker"><span class="barra"></span>Tappa 8</div>
    <h2 class="titolo">Checklist di preparazione</h2>
    <p class="occhiello">Spunta i punti man mano che li completi. Ti serve come promemoria operativo
    per arrivare pronto all'esame.</p>
    <div class="check-list" id="check-list">
      ${["Ho scelto l'argomento principale e so spiegare perché lo trovo significativo",
         "Ho individuato almeno un collegamento per ciascuna area disciplinare",
         "Ho definito il mio progetto di vita e la scuola superiore che vorrei",
         "Ho preparato l'elaborato digitale seguendo la struttura delle slide",
         "Ho una parte da esporre o domande a cui rispondere in lingua straniera",
         "Ho raccolto fonti e dichiarato l'eventuale uso dell'intelligenza artificiale",
         "So come si calcola il voto finale e che cosa viene valutato al colloquio",
         "(Facoltativo) Ho realizzato un artefatto legato al mio argomento"]
        .map((t,i)=>`
        <div class="check-item" data-i="${i}">
          <div class="check-box">${ico("check","#ffffff")}</div>
          <div class="txt">${t}</div>
        </div>`).join("")}
    </div>
    <div class="progresso">
      <div class="barra-est"><div class="barra-int" id="barra-int"></div></div>
      <div class="msg" id="progresso-msg"><b>0 / 8</b> punti completati</div>
    </div>`;
  }
  return "";
}

/* ============================================================
   NAVIGAZIONE
   ============================================================ */
function navBasso(){
  const primo = tappaCorrente===0, ultimo = tappaCorrente===TAPPE.length-1;
  return `<div class="nav-basso">
    <button class="btn btn-secondario" onclick="vai(${tappaCorrente-1})" ${primo?"disabled":""}>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Indietro</button>
    <button class="btn btn-primario" onclick="vai(${tappaCorrente+1})" ${ultimo?"disabled":""}>
      ${ultimo?"Fine":"Avanti"}
      ${ultimo?"":`<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`}
    </button>
  </div>`;
}

function renderStepper(){
  document.getElementById("stepper").innerHTML = TAPPE.map((t,i)=>`
    <button class="${i===tappaCorrente?"attivo":""} ${visitate.has(i)&&i!==tappaCorrente?"fatto":""}" onclick="vai(${i})">
      <span class="num">${visitate.has(i)&&i!==tappaCorrente?ico("check","#fff"):(i)}</span>
      ${t.label}
    </button>`).join("");
}

function render(){
  const id = TAPPE[tappaCorrente].id;
  document.getElementById("main").innerHTML =
    `<section class="tappa visibile">${contenuto(id)}${navBasso()}</section>`;
  renderStepper();
  window.scrollTo({top:0,behavior:"smooth"});
  if(id==="voto") initCalcolatore();
  if(id==="chiusura") initChecklist();
}

function vai(i){
  if(i<0||i>=TAPPE.length) return;
  tappaCorrente=i; visitate.add(i); render();
}

/* ============================================================
   CALCOLATORE VOTO  (formula DM 741/2017)
   ============================================================ */
function arrotonda(x){
  const parteDec = x - Math.floor(x);
  return parteDec >= 0.5 ? Math.ceil(x) : Math.floor(x);
}
function initCalcolatore(){
  const ids = ["amm","ita","mat","lin","col"];
  function aggiorna(){
    const v = {};
    ids.forEach(k=>{
      v[k] = +document.getElementById("r-"+k).value;
      document.getElementById("v-"+k).textContent = v[k];
    });
    const mediaProve = (v.ita+v.mat+v.lin+v.col)/4;
    const grezzo = (v.amm + mediaProve)/2;
    const finale = arrotonda(grezzo);
    document.getElementById("voto-finale").textContent = finale;

    const lode = (finale===10 && v.amm===10 && mediaProve>=9.5);
    document.getElementById("lode-area").innerHTML =
      lode ? `<div class="badge-lode">10 e LODE</div>` : "";

    document.getElementById("passaggi").innerHTML = `
      <div class="step"><span>Media delle prove d'esame</span><span>${mediaProve.toFixed(2).replace(".",",")}</span></div>
      <div class="step"><span>Voto di ammissione</span><span>${v.amm.toFixed(2).replace(".",",")}</span></div>
      <div class="step"><span>( ${v.amm} + ${mediaProve.toFixed(2).replace(".",",")} ) ÷ 2</span><span>${grezzo.toFixed(3).replace(".",",")}</span></div>
      <div class="step finale"><span>Arrotondamento</span><span>${finale}${lode?" e lode":""}</span></div>`;
  }
  ids.forEach(k=>document.getElementById("r-"+k).addEventListener("input",aggiorna));
  aggiorna();
}

/* ============================================================
   CHECKLIST
   ============================================================ */
function initChecklist(){
  const items = document.querySelectorAll(".check-item");
  const totale = items.length;
  function aggiornaProgresso(){
    const fatti = document.querySelectorAll(".check-item.spuntato").length;
    document.getElementById("barra-int").style.width = (fatti/totale*100)+"%";
    let msg = `<b>${fatti} / ${totale}</b> punti completati`;
    if(fatti===totale) msg = `<b>Tutto pronto.</b> Hai completato la checklist: sei pronto per l'esame.`;
    else if(fatti>=totale/2) msg = `<b>${fatti} / ${totale}</b> punti — sei a buon punto, continua così.`;
    document.getElementById("progresso-msg").innerHTML = msg;
  }
  items.forEach(it=>it.addEventListener("click",()=>{
    it.classList.toggle("spuntato"); aggiornaProgresso();
  }));
  aggiornaProgresso();
}

/* ============================================================
   AVVIO
   ============================================================ */
document.getElementById("nome-scuola").textContent = CONFIG.scuola;

/* Anno scolastico automatico: rollover al giorno indicato in CONFIG */
function annoScolastico(){
  const oggi = new Date();
  const Y = oggi.getFullYear();
  const m = oggi.getMonth() + 1;   // 1-based
  const d = oggi.getDate();
  const dopoRollover = (m > CONFIG.rolloverMese) ||
                       (m === CONFIG.rolloverMese && d >= CONFIG.rolloverGiorno);
  const inizio = dopoRollover ? Y : Y - 1;
  return inizio + " / " + (inizio + 1);
}
document.getElementById("anno-sc").textContent = "Anno scolastico " + annoScolastico();

render();
</script>
